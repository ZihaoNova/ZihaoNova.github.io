- title: "Land-cover Simulation Workflows"
  kicker: "Scenario modeling"
  problem: "Large scenario runs can hide assumptions and make output changes hard to explain."
  approach: "Build simulation pipelines with explicit scenario inputs, year-by-year outputs, and inspectable intermediate artifacts."
  output: "Reproducible rasters, comparison-ready outputs, and clearer demand and allocation assumptions."
  tools:
    - "Python"
    - "rasterio"
    - "NumPy"
    - "GDAL"
    - "PyTorch"

- title: "Raster Validation and AOI Smoke Checks"
  kicker: "Raster QA"
  problem: "Full-raster validation is expensive and can miss local regressions until late."
  approach: "Validate representative AOI windows first, then scale only when the local evidence is sound."
  output: "Fast GeoTIFF checks, summaries, and mismatch diagnostics."
  tools:
    - "Python"
    - "rasterio"
    - "GDAL"
    - "NumPy"
    - "xarray"

- title: "Windowed CA and Dask Pipelines"
  kicker: "Scalable simulation"
  problem: "Chunked cellular automata simulation can introduce boundary behavior and allocation drift."
  approach: "Trace window demand, CA allocation, and chunk-level artifacts through the real pipeline path."
  output: "Boundary-aware diagnostics, scalable execution, and debuggable simulation steps."
  tools:
    - "Python"
    - "Dask"
    - "PyTorch"
    - "rasterio"
    - "NumPy"
