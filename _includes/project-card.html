{% assign project = include.project %}
<article class="project-card">
  <p class="project-kicker">{{ project.kicker | escape }}</p>
  <h3>{{ project.title | escape }}</h3>
  <dl>
    <dt>Problem</dt>
    <dd>{{ project.problem | escape }}</dd>
    <dt>Approach</dt>
    <dd>{{ project.approach | escape }}</dd>
    <dt>Output</dt>
    <dd>{{ project.output | escape }}</dd>
  </dl>
  <div class="tool-list" aria-label="Tools">
    {% for tool in project.tools %}
      <span>{{ tool | escape }}</span>
    {% endfor %}
  </div>
</article>
